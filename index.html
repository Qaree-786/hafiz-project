<body style="background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh;">

    <form action="/register" method="POST" style="background-color: white; padding: 30px; border-radius: 15px; box-shadow: 0px 8px 24px rgba(0,0,0,0.1); text-align: center; width: 350px;">
        
        <h2 style="color: #1a237e; margin-bottom: 20px;">Student Admission</h2>
        
        <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4" width="100%" style="border-radius: 8px; margin-bottom: 20px;">

        <div style="text-align: left;">
            <label style="font-weight: bold; color: #555; display: block; margin-bottom: 5px;">Full Name</label>
            <input type="text" name="user_name" placeholder="John Doe" required style="padding: 12px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-size: 14px;">
            
            <label style="font-weight: bold; color: #555; display: block; margin-bottom: 5px;">Your City</label>
            <input type="text" name="name" placeholder="Faisalabad" required style="padding: 12px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; margin-bottom: 20px; font-size: 14px;">
        </div>

        <button type="submit" style="background-color: #1a237e; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-bottom: 15px;">
            Register Now
        </button>

        <a href="https://www.youtube.com" style="color: #ff0000; text-decoration: none; font-size: 14px; font-weight: bold;">
            Need Help? Watch Tutorial
        </a>

    </form>

</body>
